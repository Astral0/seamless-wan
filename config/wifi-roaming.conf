# seamless-wan: WiFi Roaming Config for wan4 (MT7601U)
# Format: SSID|key|priority (lower = better)
# Use SSID|open|priority for open networks
#
# NOTE: Train WiFi (_SNCF_*) is handled by wan2 (built-in dual-band WiFi), NOT here.
# This config is for the secondary WiFi adapter (MT7601U, 2.4GHz only).
#
# Example:
# MyHotspot|mypassword123|1
# CoffeeShop|open|5
